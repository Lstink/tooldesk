name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            rustTarget: "aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
            rustTarget: "x86_64-apple-darwin"
          - platform: "windows-latest"
            args: ""
            rustTarget: ""
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Install Rust stable (macOS 多架构)
        if: matrix.rustTarget != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTarget }}

      - name: Install Rust stable (Windows)
        if: matrix.rustTarget == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          key: "${{ matrix.platform }}-${{ matrix.rustTarget }}"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release notes
        id: release_notes
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          NOTES=""

          # 1) Prefer CHANGELOG.md section for current version.
          if [ -f CHANGELOG.md ]; then
            CHANGELOG_NOTES="$(awk -v ver="$VERSION" '
              BEGIN { in_section = 0 }
              $0 ~ "^## \\[" ver "\\]" { in_section = 1; next }
              in_section && $0 ~ "^## \\[" { exit }
              in_section { print }
            ' CHANGELOG.md)"

            if [ -n "$(printf "%s" "$CHANGELOG_NOTES" | tr -d '[:space:]')" ]; then
              NOTES="$CHANGELOG_NOTES"
            fi
          fi

          # 2) Fallback to tag annotation.
          if [ -z "$(printf "%s" "$NOTES" | tr -d '[:space:]')" ]; then
            TAG_NOTES="$(git for-each-ref "refs/tags/${TAG}" --format='%(contents)')"
            if [ -n "$(printf "%s" "$TAG_NOTES" | tr -d '[:space:]')" ]; then
              NOTES="$TAG_NOTES"
            fi
          fi

          # 3) Final fallback.
          if [ -z "$(printf "%s" "$NOTES" | tr -d '[:space:]')" ]; then
            NOTES="Automated release for ${TAG}"
          fi

          {
            echo "body<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and create release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          includeUpdaterJson: true
          tagName: ${{ github.ref_name }}
          releaseName: "Desktool ${{ github.ref_name }}"
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
